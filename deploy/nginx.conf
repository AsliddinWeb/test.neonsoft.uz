# /etc/nginx/sites-available/test.neonsoft.uz
# Keyin: sudo ln -s /etc/nginx/sites-available/test.neonsoft.uz /etc/nginx/sites-enabled/
# Certbot SSL bloklarini o'zi qo'shadi: sudo certbot --nginx -d test.neonsoft.uz -d www.test.neonsoft.uz

server {
    listen 80;
    listen [::]:80;

    server_name test.neonsoft.uz www.test.neonsoft.uz;

    # Dist papkaga yo'l — o'zingizga moslang
    root /var/www/test.neonsoft.uz/dist;
    index index.html;

    # Log fayllar
    access_log /var/log/nginx/test.neonsoft.uz.access.log;
    error_log  /var/log/nginx/test.neonsoft.uz.error.log;

    # Gzip siqish
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/json
        application/xml
        application/rss+xml
        image/svg+xml
        font/woff
        font/woff2;

    # Xavfsizlik sarlavhalari
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Static asset cache (vite hash qilgan fayllar uchun uzoq muddat)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location ~* \.(?:ico|css|js|gif|jpe?g|png|webp|svg|woff2?|ttf|eot|otf)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
        try_files $uri =404;
    }

    # SPA fallback — barcha yo'llar index.html ga
    location / {
        try_files $uri $uri/ /index.html;
    }

    # .env va boshqa maxfiy fayllarni bloklash
    location ~ /\.(?!well-known) {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Yuklash o'lchami
    client_max_body_size 10M;
}
