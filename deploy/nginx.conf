# /etc/nginx/sites-available/test.neonsoft.uz
# Keyin: sudo ln -s /etc/nginx/sites-available/test.neonsoft.uz /etc/nginx/sites-enabled/
# SSL: sudo certbot --nginx -d test.neonsoft.uz -d www.test.neonsoft.uz

server {
    listen 80;
    listen [::]:80;

    server_name test.neonsoft.uz www.test.neonsoft.uz;

    root /home/projects/test.neonsoft.uz/dist;
    index index.html;

    access_log /var/log/nginx/test.neonsoft.uz.access.log;
    error_log  /var/log/nginx/test.neonsoft.uz.error.log;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/javascript application/json application/xml application/rss+xml
        image/svg+xml font/woff font/woff2;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    client_max_body_size 10M;

    # API backend (Node.js - PM2 orqali localhost:3001 da)
    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Static asset cache (vite hash qilgan fayllar)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location ~* \.(?:ico|css|js|gif|jpe?g|png|webp|svg|woff2?|ttf|eot|otf)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
        try_files $uri =404;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # .env va maxfiy fayllarni bloklash
    location ~ /\.(?!well-known) {
        deny all;
        access_log off;
        log_not_found off;
    }
}
